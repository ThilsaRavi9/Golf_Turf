<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1B5E20"/>

  <!-- Golf flag pole -->
  <rect x="29" y="12" width="2.5" height="30" rx="1" fill="white" opacity="0.95"/>

  <!-- Flag triangle -->
  <polygon points="31.5,12 46,19 31.5,26" fill="#4CAF50"/>

  <!-- Golf ball -->
  <circle cx="26" cy="47" r="9" fill="white"/>
  <!-- Ball dimples -->
  <circle cx="23" cy="44" r="1.2" fill="#e0e0e0"/>
  <circle cx="27" cy="42.5" r="1.2" fill="#e0e0e0"/>
  <circle cx="30" cy="45" r="1.2" fill="#e0e0e0"/>
  <circle cx="24" cy="48" r="1.2" fill="#e0e0e0"/>
  <circle cx="28" cy="50" r="1.2" fill="#e0e0e0"/>

  <!-- Ground line -->
